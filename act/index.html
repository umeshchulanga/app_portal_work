<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Ownership Transfer System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .card-header {
            border-top-left-radius: 10px !important;
            border-top-right-radius: 10px !important;
            font-weight: 600;
        }
        .table-responsive {
            max-height: 600px;
            overflow-y: auto;
        }
        .cursor-pointer {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-file-invoice-dollar me-2"></i>Divisional Secretariat Transfer Portal</a>
            <div class="d-flex gap-2 flex-wrap align-items-center">
                <button class="btn btn-outline-warning btn-sm text-white" onclick="triggerJsonExport()">
                    <i class="fa-solid fa-download me-1"></i> Export Backup JSON
                </button>
                <button id="importBtn" class="btn btn-outline-light btn-sm mb-0 text-white" onclick="triggerJsonLiveImport()">
                    <i class="fa-solid fa-upload me-1"></i> Import JSON Data (Link Live)
                </button>
                <label class="btn btn-primary btn-sm mb-0 cursor-pointer">
                    <i class="fa-solid fa-file-word me-1"></i> Load DOCX Template & Export
                    <input type="file" id="templateFileInput" accept=".docx" style="display: none;" onchange="processDocxTemplate(event)">
                </label>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mb-5" id="web-ui">
        <div class="row g-4">
            <div class="col-xl-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <i class="fa-solid fa-plus-circle me-1"></i> <span id="formActionTitle">Add New Record Entry</span>
                    </div>
                    <div class="card-body">
                        <form id="recordForm">
                            <input type="hidden" id="editIndex" value="">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Vehicle Registration Number</label>
                                <input type="text" class="form-control" id="vehNo" placeholder="e.g., SP JG - 2396" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Transfer Date</label>
                                <input type="date" class="form-control" id="transferDate" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Vehicle Type (වාහන වර්ගය / ගාස්තු වර්ගය)</label>
                                <select class="form-select" id="vehType" required>
                                    <option value="" disabled selected>වාහන වර්ගය තෝරන්න...</option>
                                    <option value="මෝටර් කාර්">මෝටර් කාර්</option>
                                    <option value="ද්විත්ව කාර්ය වාහන">ද්විත්ව කාර්ය වාහන</option>
                                    <option value="අත් ට්‍රැක්ටර්">අත් ට්‍රැක්ටර්</option>
                                    <option value="සැහැල්ලු ට්‍රේලර්">සැහැල්ලු ට්‍රේලර්</option>
                                    <option value="ට්‍රැක්ටර් ට්‍රේලර්">ට්‍රැක්ටර් ට්‍රේලර්</option>                                
                                    <option value="සැහැල්ලු මෝටර් සයිකල්">සැහැල්ලු මෝටර් සයිකල්</option>
                                    <option value="මෝටර් සයිකල්">මෝටර් සයිකල්</option>
                                    <option value="මෝටර් ට්‍රයිසිකල් වෑන්">මෝටර් ට්‍රයිසිකල් වෑන්</option>
                                    <option value="සැහැල්ලු මෝටර් ලොරි">සැහැල්ලු මෝටර් ලොරි</option>
                                    <option value="මෝටර් ලොරි">මෝටර් ලොරි</option>
                                    <option value="ප්‍රයිවට් මෝටර් ලොරි">ප්‍රයිවට් මෝටර් ලොරි</option>
                                    <option value="මෝටර් ගිලන් රථ">මෝටර් ගිලන් රථ</option>
                                    <option value="මෝටර් අවමංගල රථ">මෝටර් අවමංගල රථ</option>
                                    <option value="බර ට්‍රේලර්">බර ට්‍රේලර්</option>
                                    <option value="ලොරි ට්‍රේලර්">ලොරි ට්‍රේලර්</option>
                                    <option value="බස් රථ">බස් රථ</option>
                                    <option value="පෞද්ගලික කෝච්">පෞද්ගලික කෝච්</option>
                                    <option value="නොබැඳි පත් නිකුත් කිරීම">නොබැඳි පත් නිකුත් කිරීම</option>
                                    <option value="වෙනත්">වෙනත්</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Owner Name & Address (Sinhala)</label>
                                <textarea class="form-control" id="ownerDetails" rows="3" placeholder="Name and full local address" required></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Receipt No 1</label>
                                    <input type="text" class="form-control" id="rec1" placeholder="V/25 938623" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Amount 1 (LKR)</label>
                                    <input type="text" class="form-control" id="amt1" placeholder="450.00" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Receipt No 2 (Optional)</label>
                                    <input type="text" class="form-control" id="rec2" placeholder="J 793283">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small fw-bold">Amount 2 (Unit Price Only)</label>
                                    <input type="text" class="form-control" id="amt2" placeholder="700.00">
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" id="cancelEditBtn" class="btn btn-secondary w-50" style="display: none;" onclick="clearFormState()">
                                    Cancel Edit
                                </button>
                                <button type="submit" id="submitBtn" class="btn btn-success flex-grow-1">
                                    <i class="fa-solid fa-save me-1"></i> Insert Entry
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-xl-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                        <span><i class="fa-solid fa-filter me-1"></i> Queue Data Filtering Pipeline</span>
                        <button class="btn btn-sm btn-light py-0" onclick="clearDateFilter()">Clear Range</button>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">From Date</label>
                                <input type="date" class="form-control" id="filterStartDate" onchange="renderApp()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold">To Date</label>
                                <input type="date" class="form-control" id="filterEndDate" onchange="renderApp()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <span><i class="fa-solid fa-table me-1"></i> Active Record Queue</span>
                        <span class="badge bg-primary" id="recordCount">0 Records</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead>
                                    <tr>
                                        <th class="text-center" style="width: 5%">#</th>
                                        <th style="width: 15%">Vehicle No</th>
                                        <th style="width: 15%">Transfer Date</th>
                                        <th style="width: 15%">Type</th>
                                        <th style="width: 25%">Owner Details</th>
                                        <th style="width: 15%">Receipts & LKR</th>
                                        <th class="text-end" style="width: 10%">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="recordsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.2.0/dist/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script> 

    <script>
        const defaultDataset = [
            { vehNo: "SP JG - 2396", transferDate: "2026-06-15", vehType: "මෝටර් සයිකල්", ownerDetails: "ලද්දු කෞෂාල් ලසන්ත ද සිල්වා, මිහිර, බෝයගොඩ පාර, තොල්වත්ත.", rec1: "V/25 938623", amt1: "450.00", rec2: "J 793283", amt2: "700.00" },
            { vehNo: "SP BIT - 5424", transferDate: "2026-06-15", vehType: "මෝටර් සයිකල්", ownerDetails: "වවිලාගල ලියනගේ දෙව්මි සෙව්වන්දි, 366 නවාගන්නාකොලවත්ත, කලුපේ, හික්කඩුව", rec1: "L/25 –938614", amt1: "450.00", rec2: "J 793279", amt2: "700.00" },
            { vehNo: "SP BAE- 3337", transferDate: "2026-06-18", vehType: "මෝටර් සයිකල්", ownerDetails: "රන්නුළු පුෂ්පකුමාර දයාවංශ ද සොයිසා, සෙත්සෙවන, අකුරල, කහව.", rec1: "V/25 938604", amt1: "1450.00", rec2: "J 793272", amt2: "700.00" }
        ];

        let dataset = [];
        let fileHandle = null; 

        function initData() {
            const localData = localStorage.getItem('vehicle_transfer_data');
            if (localData) {
                try {
                    dataset = JSON.parse(localData);
                } catch (e) {
                    dataset = [...defaultDataset];
                }
            } else {
                dataset = [...defaultDataset];
                syncStateData();
            }
            
            document.getElementById('transferDate').value = new Date().toISOString().substring(0, 10);
            renderApp();
        }

        async function syncStateData() {
            localStorage.setItem('vehicle_transfer_data', JSON.stringify(dataset));
            
            if (fileHandle) {
                try {
                    const writableStream = await fileHandle.createWritable();
                    await writableStream.write(JSON.stringify(dataset, null, 4));
                    await writableStream.close();
                } catch (err) {
                    console.error("Automated background storage file synchronization routine failed:", err);
                }
            }
        }

        async function triggerJsonLiveImport() {
            if ('showOpenFilePicker' in window) {
                try {
                    const [handle] = await window.showOpenFilePicker({
                        types: [{
                            description: 'JSON Database Document',
                            accept: {'application/json': ['.json']},
                        }],
                        multiple: false
                    });
                    
                    fileHandle = handle;
                    const targetFile = await fileHandle.getFile();
                    const contents = await targetFile.text();
                    
                    if (contents.trim().length > 0) {
                        const parsed = JSON.parse(contents);
                        if (Array.isArray(parsed)) {
                            dataset = parsed;
                            await syncStateData();
                            renderApp();
                            
                            const importBtn = document.getElementById('importBtn');
                            importBtn.innerHTML = `<i class="fa-solid fa-link me-1"></i> Data Linked Live`;
                            importBtn.className = "btn btn-success btn-sm text-white";
                            
                            alert("JSON data imported successfully! Direct live background saving is now active on this file.");
                        } else {
                            alert("Invalid database structure formatting inside the chosen file.");
                        }
                    }
                } catch (err) {
                    console.warn("File import/linking canceled by user.", err);
                }
            } else {
                const genericInput = document.createElement('input');
                genericInput.type = 'file';
                genericInput.accept = '.json';
                genericInput.onchange = function(e) {
                    const reader = new FileReader();
                    reader.onload = async function(evt) {
                        try {
                            const parsedData = JSON.parse(evt.target.result);
                            if (Array.isArray(parsedData)) {
                                dataset = parsedData;
                                await syncStateData();
                                renderApp();
                                alert("Database updated dynamically. (Note: Real-time live file syncing is not supported on this browser version).");
                            } else {
                                alert("Invalid JSON data schema.");
                            }
                        } catch (err) {
                            alert("Error parsing JSON target elements.");
                        }
                    };
                    reader.readAsText(e.target.files[0]);
                };
                genericInput.click();
            }
        }

        const form = document.getElementById('recordForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const record = {
                vehNo: document.getElementById('vehNo').value.trim(),
                transferDate: document.getElementById('transferDate').value,
                vehType: document.getElementById('vehType').value,
                ownerDetails: document.getElementById('ownerDetails').value.trim(),
                rec1: document.getElementById('rec1').value.trim(),
                amt1: document.getElementById('amt1').value.trim(),
                rec2: document.getElementById('rec2').value.trim(),
                amt2: document.getElementById('amt2').value.trim()
            };

            const editIndex = document.getElementById('editIndex').value;

            if (editIndex !== "") {
                dataset[parseInt(editIndex)] = record;
            } else {
                dataset.push(record);
            }

            await syncStateData();
            clearFormState();
            renderApp();
        });

        function populateEditForm(index) {
            const data = dataset[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('vehNo').value = data.vehNo;
            document.getElementById('transferDate').value = data.transferDate || "";
            document.getElementById('vehType').value = data.vehType;
            document.getElementById('ownerDetails').value = data.ownerDetails;
            document.getElementById('rec1').value = data.rec1;
            document.getElementById('amt1').value = data.amt1;
            document.getElementById('rec2').value = data.rec2 || "";
            document.getElementById('amt2').value = data.amt2 || "";

            document.getElementById('formActionTitle').innerText = "Modify/Edit Entry Target";
            document.getElementById('submitBtn').innerHTML = `<i class="fa-solid fa-pen-to-square me-1"></i> Save Structural Edit`;
            document.getElementById('cancelEditBtn').style.display = "block";
        }

        function clearFormState() {
            form.reset();
            document.getElementById('editIndex').value = "";
            document.getElementById('transferDate').value = new Date().toISOString().substring(0, 10);
            document.getElementById('formActionTitle').innerText = "Add New Record Entry";
            document.getElementById('submitBtn').innerHTML = `<i class="fa-solid fa-save me-1"></i> Insert Entry`;
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        async function deleteRecord(index) {
            if(confirm("Are you sure you want to permanently delete this entry?")) { 
                dataset.splice(index, 1); 
                await syncStateData();
                if(document.getElementById('editIndex').value === String(index)) {
                    clearFormState();
                }
                renderApp(); 
            }
        }

        function clearDateFilter() {
            document.getElementById('filterStartDate').value = "";
            document.getElementById('filterEndDate').value = "";
            renderApp();
        }

        function getFilteredDataset() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            
            return dataset
                .map((item, originalIndex) => ({ ...item, originalIndex }))
                .filter(item => {
                    if (!item.transferDate) return false;
                    if (startDate && item.transferDate < startDate) return false;
                    if (endDate && item.transferDate > endDate) return false;
                    return true;
                });
        }

        function renderApp() {
            const uiBody = document.getElementById('recordsTableBody');
            const filteredData = getFilteredDataset();
            document.getElementById('recordCount').innerText = `${filteredData.length} Entries`;
            uiBody.innerHTML = "";

            filteredData.forEach((data, displayIndex) => {
                const formattedIndex = String(displayIndex + 1).padStart(2, '0');
                let receiptsFormatted = `${data.rec1} (${data.amt1})`;
                if (data.rec2) {
                    receiptsFormatted += `<br><small class="text-muted">${data.rec2} (${data.amt2})</small>`;
                }

                uiBody.innerHTML += `
                <tr>
                    <td class="text-center fw-bold">${formattedIndex}</td>
                    <td class="fw-bold text-primary">${data.vehNo}</td>
                    <td class="small fw-semibold text-secondary">${data.transferDate || 'N/A'}</td>
                    <td><span class="badge bg-secondary">${data.vehType}</span></td>
                    <td class="small">${data.ownerDetails}</td>
                    <td class="font-monospace small">${receiptsFormatted}</td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-primary" onclick="populateEditForm(${data.originalIndex})"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn btn-outline-danger" onclick="deleteRecord(${data.originalIndex})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
        }

        function triggerJsonExport() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataset, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "vehicle_transfer_records_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function processDocxTemplate(event) {
            const fileInput = event.target;
            if (fileInput.files.length === 0) return;

            const targetFile = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                try {
                    const zip = new PizZip(arrayBuffer);
                    const doc = new window.docxtemplater(zip, {
                        paragraphLoop: true,
                        linebreaks: true,
                    });

                    const activeFilteredQueue = getFilteredDataset();
                    
                    if(activeFilteredQueue.length === 0) {
                        alert("The active queue context table is empty! Please verify your active timeline filter parameters.");
                        fileInput.value = ""; 
                        return;
                    }

                    const summary = {
                        car:     { count: 0, total: 0, unitPrices: [], types: ["මෝටර් කාර්"] },
                        dual:    { count: 0, total: 0, unitPrices: [], types: ["ද්විත්ව කාර්ය වාහන"] },
                        tractor: { count: 0, total: 0, unitPrices: [], types: ["අත් ට්‍රැක්ටර්", "සැහැල්ලු ට්‍රේලර්", "ට්‍රැක්ටර් ට්‍රේලර්"] },
                        bike:    { count: 0, total: 0, unitPrices: [], types: ["සැහැල්ලු මෝටර් සයිකල්", "මෝටර් සයිකල්"] },
                        tri:     { count: 0, total: 0, unitPrices: [], types: ["මෝටර් ට්‍රයිසිකල් වෑන්"] },
                        lorry:   { count: 0, total: 0, unitPrices: [], types: ["සැහැල්ලු මෝටර් ලොරි", "මෝටර් ලොරි", "ප්‍රයිවට් මෝටර් ලොරි", "මෝටර් ගිලන් රථ", "මෝටර් අවමංගල රථ"] },
                        trailer: { count: 0, total: 0, unitPrices: [], types: ["බර ට්‍රේලර්", "ලොරි ට්‍රේලර්"] },
                        bus:     { count: 0, total: 0, unitPrices: [], types: ["බස් රථ", "පෞද්ගලික කෝච්"] },
                        licence: { count: 0, total: 0, unitPrices: [], types: ["නොබැඳි පත් නිකුත් කිරීම"] },
                        other:   { count: 0, total: 0, unitPrices: [], types: ["වෙනත්"] }
                    };

                    let grandCount = 0;
                    let grandTotal = 0;

                    const rolesPayload = activeFilteredQueue.map((item, index) => {
                        // FIX: Amount 1 නොසලකා හැර, Amount 2 පමණක් එක් එක් වාහනය සඳහා ගාස්තුව ලෙස සලකයි
                        const unitPriceFee = parseFloat(item.amt2) || 0;

                        for (const key in summary) {
                            if (summary[key].types.includes(item.vehType)) {
                                summary[key].count += 1;
                                summary[key].total += unitPriceFee; // මුළු එකතුවට එකතු කරන්නේ amt2 පමණි
                                
                                if (unitPriceFee > 0) {
                                    summary[key].unitPrices.push(unitPriceFee);
                                }
                                grandCount += 1;
                                grandTotal += unitPriceFee;
                                break;
                            }
                        }

                        return {
                            idx: String(index + 1).padStart(2, '0'),
                            vehicle_number: item.vehNo,
                            vehicle_type: item.vehType,
                            ownr_name_address: item.ownerDetails,
                            receipt_01: item.rec1,
                            receipt_02: item.rec2 || "",
                            receipt_01_fee: item.amt1,
                            receipt_02_fee: item.amt2 || ""
                        };
                    });

                    const getUnitPrice = (cat) => {
                        if (cat.unitPrices.length === 0) return "-";
                        const average = cat.unitPrices.reduce((a, b) => a + b, 0) / cat.unitPrices.length;
                        return average.toFixed(2);
                    };

                    const rightNow = new Date();
                    const localYear = String(rightNow.getFullYear());
                    const localMonth = String(rightNow.getMonth() + 1).padStart(2, '0');

                    const templateData = {
                        year: localYear,
                        month: localMonth,
                        roles: rolesPayload,

                        // Unit Prices placeholders
                        motor_car_unit_price:       getUnitPrice(summary.car),
                        dual_purpose_unit_price:    getUnitPrice(summary.dual),
                        hand_tractor:               getUnitPrice(summary.tractor), 
                        light_weigh_talor:          getUnitPrice(summary.tractor),
                        tractor_talor:              getUnitPrice(summary.tractor),
                        light_motor_cycle:          getUnitPrice(summary.bike),
                        motor_cycle:                getUnitPrice(summary.bike),
                        motor_tricycle:             getUnitPrice(summary.tri),
                        motor_tricycle_van:         getUnitPrice(summary.tri),
                        light_motor_lorry:          getUnitPrice(summary.lorry),
                        motor_lorry:                getUnitPrice(summary.lorry),
                        prime_mover:                getUnitPrice(summary.lorry),
                        ambulance:                  getUnitPrice(summary.lorry),
                        hearse:                     getUnitPrice(summary.lorry),
                        heavy_talor:                getUnitPrice(summary.trailer),
                        lorry_talor:                getUnitPrice(summary.trailer),
                        omni_bus:                   getUnitPrice(summary.bus),
                        private_coach:              getUnitPrice(summary.bus),
                        licence_history_report:     getUnitPrice(summary.licence), 
                        other:                      getUnitPrice(summary.other),   

                        // Counts placeholders
                        car_count:     summary.car.count || "-",
                        dual_count:    summary.dual.count || "-",
                        tractor_count: summary.tractor.count || "-",
                        bike_count:    summary.bike.count || "-",
                        tri_count:     summary.tri.count || "-",
                        lorry_count:   summary.lorry.count || "-",
                        trailer_count: summary.trailer.count || "-",
                        bus_count:     summary.bus.count || "-",
                        licence_count: summary.licence.count || "-",
                        other_count:   summary.other.count || "-",

                        // Totals placeholders (කාණ්ඩයේ මුළු එකතුව = වාහන ගණන x Amount 2)
                        car_total:     summary.car.total ? summary.car.total.toFixed(2) : "-",
                        dual_total:    summary.dual.total ? summary.dual.total.toFixed(2) : "-",
                        tractor_total: summary.tractor.total ? summary.tractor.total.toFixed(2) : "-",
                        bike_total:    summary.bike.total ? summary.bike.total.toFixed(2) : "-",
                        tri_total:     summary.tri.total ? summary.tri.total.toFixed(2) : "-",
                        lorry_total:   summary.lorry.total ? summary.lorry.total.toFixed(2) : "-",
                        trailer_total: summary.trailer.total ? summary.trailer.total.toFixed(2) : "-",
                        bus_total:     summary.bus.total ? summary.bus.total.toFixed(2) : "-",
                        licence_total: summary.licence.total ? summary.licence.total.toFixed(2) : "-",
                        other_total:   summary.other.total ? summary.other.total.toFixed(2) : "-",

                        grand_count:   grandCount,
                        grand_total:   grandTotal.toFixed(2)
                    };

                    doc.render(templateData);

                    const generatedOutputBlob = doc.getZip().generate({
                        type: "blob",
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    });

                    saveAs(generatedOutputBlob, `Vehicle_Report_${localYear}_${localMonth}.docx`);
                    
                } catch (error) {
                    console.error("Docxtemplater template processing failure:", error);
                    alert("Error parsing your .docx configuration layout variables.");
                } finally {
                    fileInput.value = ""; 
                }
            };

            reader.readAsArrayBuffer(targetFile);
        }

        window.onload = initData;
    </script>
</body>
</html>
